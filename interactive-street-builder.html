<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Builder | أنسنة الشرقية</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Specific Styles for the new Street Builder */
        .isb-shell {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 80px); /* Adjust based on header height */
            overflow: hidden;
            background-color: var(--clr-bg);
            margin-top: 80px; /* Header offset */
        }
        
        .isb-sidebar {
            background: var(--clr-surface);
            border-left: 1px solid var(--clr-border);
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .isb-category h3 {
            font-size: 1.1rem;
            color: var(--clr-primary);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--clr-border);
            padding-bottom: 0.5rem;
        }

        .isb-components {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .isb-component-item {
            background: var(--clr-bg);
            border: 1px solid var(--clr-border);
            border-radius: var(--border-radius);
            padding: 1rem;
            cursor: grab;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .isb-component-item:hover {
            border-color: var(--clr-primary);
            box-shadow: var(--shadow-sm);
        }

        .isb-component-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .isb-component-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--clr-text);
        }

        .isb-component-width {
            font-size: 0.8rem;
            background: var(--clr-primary);
            color: var(--clr-surface);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: bold;
        }

        .isb-component-desc {
            font-size: 0.8rem;
            color: var(--clr-text-muted);
            line-height: 1.4;
        }

        .isb-viewport {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .isb-toolbar {
            background: var(--clr-surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--clr-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .isb-toolbar-title h2 {
            font-size: 1.5rem;
            color: var(--clr-primary);
            margin: 0;
        }

        .isb-total-width {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--clr-primary);
            background: var(--clr-bg);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 1px solid var(--clr-border);
        }

        .isb-dropzone {
            flex: 1;
            padding: 2rem;
            overflow-x: auto;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: linear-gradient(var(--clr-border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--clr-border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            background-color: var(--clr-bg);
        }

        .isb-canvas-container {
            min-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 600px;
            padding: 20px;
            gap: 20px;
        }

        .isb-sequence-container {
            display: flex;
            min-height: 100px;
            width: fit-content;
            background: var(--clr-surface);
            border: 2px dashed var(--clr-primary);
            border-radius: var(--border-radius);
            padding: 10px;
            align-items: center;
            gap: 2px;
            box-shadow: var(--shadow-sm);
        }

        .isb-sequence-container.drag-over {
            background: rgba(44, 62, 80, 0.1);
            border-style: solid;
        }

        .isb-sequence-item {
            height: 80px;
            background: var(--clr-primary);
            color: var(--clr-surface);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            cursor: grab;
            position: relative;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0 5px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            transition: filter 0.2s;
        }

        .isb-sequence-item:hover {
            filter: brightness(1.1);
        }

        .isb-sequence-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .isb-sequence-item:hover .remove-btn {
            display: flex;
        }

        .isb-render-area {
            display: flex;
            flex-direction: column;
            width: fit-content;
            margin-top: 20px;
            background: var(--clr-surface);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--clr-border);
        }

        .isb-render-title {
            font-size: 1rem;
            color: var(--clr-text-muted);
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* SVG Rendering styles */
        .isb-svg-canvas {
            width: 100%;
            min-height: 400px;
            overflow: visible;
        }

        .isb-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--clr-text-muted);
            gap: 1rem;
        }

        .isb-empty-state i {
            font-size: 3rem;
            opacity: 0.5;
        }

    </style>
</head>

<body class="builder-page">
    <header class="main-header" style="position: fixed; width: 100%; top: 0; z-index: 100;">
        <div class="container header-container">
            <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">
                <img src="logo.svg" alt="شعار أمانة المنطقة الشرقية" class="main-logo">
                <h1>أنسنة <span>الشرقية</span></h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="principles.html">المبادئ الأساسية</a></li>
                    <li><a href="design.html">دليل التصميم</a></li>
                    <li><a href="execution.html">دليل التنفيذ</a></li>
                    <li><a href="builder-library.html">صمم بنفسك</a></li>
                    <li><a href="interactive-map.html">الخريطة التفاعلية</a></li>
                    <li><a href="interactive-street-builder.html" class="active">Street Builder</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="isb-shell">
        <aside class="isb-sidebar" id="isb-sidebar">
            <!-- Sidebar content populated by JS -->
        </aside>
        
        <section class="isb-viewport">
            <div class="isb-toolbar">
                <div class="isb-toolbar-title">
                    <h2>Street Section Builder</h2>
                </div>
                <div class="isb-total-width" id="isb-total-width">
                    Total Street Width: 0.0m
                </div>
            </div>
            
            <div class="isb-dropzone" id="isb-dropzone">
                <div class="isb-canvas-container">
                    <!-- The drop area for sequencing -->
                    <div class="isb-sequence-container" id="isb-sequence-container">
                        <div class="isb-empty-state" id="isb-empty-state" style="padding: 20px 40px;">
                            <i class="fas fa-hand-holding-hand"></i>
                            <p>Drag and drop street components here</p>
                        </div>
                    </div>

                    <!-- The rendered visual -->
                    <div class="isb-render-area" id="isb-render-area" style="display: none;">
                        <div class="isb-render-title">Elevation & Plan View</div>
                        <svg class="isb-svg-canvas" id="isb-svg-canvas" preserveAspectRatio="xMidYMid meet"></svg>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="interactive-street-builder.js"></script>
</body>

</html>
